    - Signaling and STUN services provided by Python code

    - Screenshare (avaliable only from desktop browsers, mobile screens share is not supported)

        const resizeImage = (file, maxSizeInMB, callback) => {
            const fileSizeInMB = file.size / (1024 * 1024);
            if (fileSizeInMB <= maxSizeInMB) {
                callback(file);
            } else {
                const img = new Image();
                const reader = new FileReader();
                reader.onload = (event) => {
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width;
                    let height = img.height;
                    const maxDim = 1024;

                    if (width > height) {
                        if (width > maxDim) {
                            height *= maxDim / width;
                            width = maxDim;
                        }
                    } else {
                        if (height > maxDim) {
                            width *= maxDim / height;
                            height = maxDim;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;

                    ctx.drawImage(img, 0, 0, width, height);

                    const quality = 0.7;

                    canvas.toBlob((blob) => {
                        callback(blob);
                    }, 'image/jpeg', quality);
                };
            }
        };

            const maxFileSize = 300 * 1024 * 1024;

            if (file.size <= maxFileSize) {
                callback(file);
            } else {
                const video = document.createElement('video');
                const reader = new FileReader();
                reader.onload = (event) => {
                    video.src = event.target.result;
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = Math.sqrt((file.size / maxFileSize) * 0.5);

                        canvas.width = video.videoWidth / scale;
                        canvas.height = video.videoHeight / scale;

                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        canvas.toBlob((blob) => {
                            callback(blob);
                        }, 'video/mp4', 0.6);
                    };
                };
                reader.readAsDataURL(file);

            let bitrateSend = 0;
            let bitrateReceive = 0;
            let currentBytesSent = 0;
            let currentBytesReceived = 0;
            let currentTimestamp = 0;

            stats.forEach(report => {
                // Calculate latency (RTT)
                if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                    if (report.currentRoundTripTime) {
                        rtt = report.currentRoundTripTime * 1000; // Convert to milliseconds
                    }
                }

                // Track the total bytes sent and received over data channels
                if (report.type === 'data-channel') {
                    if (report.bytesSent) {
                        currentBytesSent += report.bytesSent;
                    }
                    if (report.bytesReceived) {
                        currentBytesReceived += report.bytesReceived;
                    }
                }
                // Track the timestamp for rate calculation
                if (report.timestamp) {
                    currentTimestamp = report.timestamp;
                }
            });

            // Calculate bitrate (in Mbps)
            if (lastTimestamp && currentTimestamp !== lastTimestamp) {
                const timeElapsedInSeconds = (currentTimestamp - lastTimestamp) / 1000; // Convert to seconds

                bitrateSend = ((currentBytesSent - lastBytesSent) * 8) / (timeElapsedInSeconds * 1_000_000); // Convert to Mbps
                bitrateReceive = ((currentBytesReceived - lastBytesReceived) * 8) / (timeElapsedInSeconds * 1_000_000); // Convert to Mbps
            }

            // Calculate total bytes sent and received
            const newBytesSent = currentBytesSent - lastBytesSent;
            const newBytesReceived = currentBytesReceived - lastBytesReceived;

            // Add the new totals to the accumulated totals
            accumulatedBytesSent += newBytesSent;
            accumulatedBytesReceived += newBytesReceived;

            // Store the accumulated totals in local storage
            localStorage.setItem('accumulatedBytesSent', accumulatedBytesSent);
            localStorage.setItem('accumulatedBytesReceived', accumulatedBytesReceived);

            // Update the previous values for the next calculation
            lastBytesSent = currentBytesSent;
            lastBytesReceived = currentBytesReceived;
            lastTimestamp = currentTimestamp;

            document.getElementById('latencyDisplay').textContent = rtt !== null ? `${Math.round(rtt)}ms` : 'N/A';

            }
            const screenShareTrack = window.remoteStream.getVideoTracks().find(track => track.kind === "video");
            if (screenShareTrack) {
                screenShareVideo.srcObject = new MediaStream([screenShareTrack]);
                screenShareVideo.style.visibility = "visible";
            } else {
                console.error("Remote stream does not contain screen share track.");
            }
        } else {
            console.error("Screen share video element not found for User2.");
        }

        // Show local and remote video feeds
        const localVideoThumbnail = document.getElementById('localVideoThumbnail');
        const remoteVideoThumbnail = document.getElementById('remoteVideoThumbnail');
        const videoFeedsContainer = document.getElementById('videoFeedsContainer');

        if (localVideoThumbnail && window.localStream) {
            localVideoThumbnail.srcObject = window.localStream;
        }

        if (remoteVideoThumbnail && window.remoteStream) {
            remoteVideoThumbnail.srcObject = window.remoteStream;
        }

        if (videoFeedsContainer) {
            videoFeedsContainer.style.display = 'flex';
            videoFeedsContainer.style.visibility = 'visible';
        }
    };



    function handleIncomingScreenShareStop() {
        console.log('Screen sharing has stopped.');

        window.isRemoteScreenSharing = false;

        const screenShareContainer = document.getElementById('screenShareContainer');
        const screenShareVideo = document.getElementById('screenShareVideo');
        const videoFeedsContainer = document.getElementById('videoFeedsContainer');

        screenShareContainer.style.display = 'none';
        screenShareContainer.style.visibility = 'hidden';

        videoFeedsContainer.style.display = 'none';
        videoFeedsContainer.style.visibility = 'hidden';

        if (screenShareVideo.srcObject) {
            screenShareVideo.srcObject.getTracks().forEach(track => track.stop());
        }
        screenShareVideo.srcObject = null;
    }

    // Ensure modal is hidden on load
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('screenShareModal').style.display = 'none';
    });

    // No duplicate #videoFeedsContainer or #screenShareContainer in HTML




    function toggleFullScreen() {
        const screenShareContainer = document.getElementById('screenShareContainer');
        const body = document.body;

        if (isFullScreen) {
            // Exit full-screen mode
            body.classList.remove('fullscreen');
            screenShareContainer.style.height = '70%'; 
            isFullScreen = false;
        } else {
            // Enter full-screen mode
            body.classList.add('fullscreen');
            screenShareContainer.style.height = '100%'; 
            isFullScreen = true;
        }
    }


    function toggleScreenShare() {
        console.log("toggleScreenShare");

        if (screenShareStream) {
            // If screen sharing is already active, stop it
            stopScreenShare();
        } else {
            // Otherwise, start screen sharing
            startScreenShare();
        }
    }


    function stopScreenShare() {
        console.log("Stopping screen share...");

        // Stop screen share stream tracks
        if (screenShareStream) {
            screenShareStream.getTracks().forEach(track => track.stop());
            screenShareStream = null;
        }

        // Reset screen share video
        const screenShareVideo = document.getElementById("screenShareVideo");
        if (screenShareVideo) {
            screenShareVideo.srcObject = null;
            screenShareVideo.style.visibility = "hidden";
            console.log("Screen share video hidden.");
        }

        // Hide screen share container
        const screenShareContainer = document.getElementById("screenShareContainer");
        if (screenShareContainer) {
            screenShareContainer.style.display = "none";
            screenShareContainer.style.visibility = "hidden";
            console.log("Screen share container hidden.");
        }

        // Hide screen share modal
        const screenShareModal = document.getElementById("screenShareModal");
        if (screenShareModal) {
            screenShareModal.style.display = "none";
            screenShareModal.style.visibility = "hidden";
            console.log("Screen share modal hidden.");
        }

        // Hide video feeds container
        const videoFeedsContainer = document.getElementById("videoFeedsContainer");
        if (videoFeedsContainer) {
            videoFeedsContainer.style.display = "none";
            videoFeedsContainer.style.visibility = "hidden";
            console.log("Video feeds container hidden.");
        }

        // Reset local and remote video thumbnails
        const localVideoThumbnail = document.getElementById("localVideoThumbnail");
        if (localVideoThumbnail) {
            localVideoThumbnail.srcObject = null;
        }

        const remoteVideoThumbnail = document.getElementById("remoteVideoThumbnail");
        if (remoteVideoThumbnail) {
            remoteVideoThumbnail.srcObject = null;
        }

        // Notify peers about the screen sharing stop
        if (dataChannel && dataChannel.readyState === "open") {
            dataChannel.send(JSON.stringify({
                type: "screen-share-stopped",
                user: user
            }));
            console.log("Screen share stop message sent to remote peer.");
        }

        console.log("Screen sharing stopped and UI reset.");
    }






    document.getElementById('acceptScreenShareButton').onclick = () => {
        console.log("acceptScreenShareButton");
        const screenShareModal = document.getElementById('screenShareModal');
        const screenShareContainer = document.getElementById('screenShareContainer');
        const screenShareVideo = document.getElementById('screenShareVideo');
        const videoFeedsContainer = document.getElementById('videoFeedsContainer');
        const localVideoThumbnail = document.getElementById('localVideoThumbnail');
        const remoteVideoThumbnail = document.getElementById('remoteVideoThumbnail');

        // Hide the modal
        screenShareModal.style.display = 'none';
        screenShareModal.style.visibility = 'hidden';

        // Show the screen share container
    //  if (screenShareContainer) {
            screenShareContainer.style.display = 'flex';
            screenShareContainer.style.visibility = 'visible';
    //  }

        // Attach the remote stream to the screen share video element
        if (screenShareVideo && window.remoteStream) {
            screenShareVideo.srcObject = window.remoteStream;
            screenShareVideo.play().catch(error => {
                console.error(`Error playing shared screen video: ${error.message}`);
            });
        }

        // Show the video feeds container
        if (videoFeedsContainer) {
            videoFeedsContainer.style.display = 'flex';
            videoFeedsContainer.style.visibility = 'visible';
        }

        // Attach local and remote streams to thumbnails
        if (localVideoThumbnail && window.localStream) {
            localVideoThumbnail.srcObject = window.localStream;
        }
        if (remoteVideoThumbnail && window.remoteStream) {
            remoteVideoThumbnail.srcObject = window.remoteStream;
        }

        // Notify user1 that screen share has been accepted
        socket.emit('screen-share-accepted', { user: 'user2', channel: channel });
    };


    window.addEventListener('beforeunload', () => {
        stopScreenShare();
    });



    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('screenShareModal').style.display = 'none';
        document.getElementById('screenShareContainer').style.display = 'none';
        document.getElementById('videoFeedsContainer').style.display = 'none';
    });


    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        document.getElementById('channelName').innerText = params.get('channel') || 'default';
        document.getElementById('userName').innerText = params.get('user') || 'Anonymous';

    document.addEventListener('DOMContentLoaded', () => {
        const videoCallModal = document.getElementById('videoCallModal');
        videoCallModal.style.display = 'none'; // Ensure it remains hidden on load
    });




    let currentEdit = ''; // Track which field is being edited: 'channel' or 'user'

    function openEditModal(type) {
        currentEdit = type;
        const currentValue = document.getElementById(type === 'channel' ? 'channelName' : 'userName').innerText;

        document.getElementById('modalTitle').innerText = `Change ${type === 'channel' ? 'Channel Name' : 'User Nickname'}`;
        document.getElementById('editField').value = currentValue;
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveModalEdit() {
        const newValue = document.getElementById('editField').value.trim();
        if (newValue === '') return;

        // ✅ Only reload if online
        if (!navigator.onLine) {
            alert("You are offline. Channel/user changes require an internet connection.");
            closeModalEdit();
            return;
        }

        const params = new URLSearchParams(window.location.search);
        params.set(currentEdit, newValue);

        const newURL = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
        window.location.href = newURL; // Reload with updated values
    }

    function closeModalEdit() {
        document.getElementById('editModal').style.display = 'none';
    }



    // Get the status indicator element
    const statusIndicator = document.getElementById('status-indicator');

    // Add event listener for connection state changes
    peerConnection.addEventListener('connectionstatechange', () => {
        switch (peerConnection.connectionState) {
            case 'connected':
                // Peer is connected
                statusIndicator.className = 'status-indicator online'; // Green
                console.log("Peer is connected");
                break;
            case 'disconnected':
            case 'failed':
            case 'closed':
                // Peer is disconnected
                statusIndicator.className = 'status-indicator offline'; // Red
                console.log("Peer is disconnected");
                break;
            default:
                console.log(`Connection state changed to: ${peerConnection.connectionState}`);
        }
    });

    // Add event listener for ICE connection state changes (optional)
    peerConnection.addEventListener('iceconnectionstatechange', () => {
        switch (peerConnection.iceConnectionState) {
            case 'connected':
            case 'completed': // ICE completed and stable
                statusIndicator.className = 'status-indicator online'; // Green
                console.log("ICE connection state: connected/completed");
                break;
            case 'disconnected':
            case 'failed':
            case 'closed':
                statusIndicator.className = 'status-indicator offline'; // Red
                console.log("ICE connection state: disconnected/failed/closed");
                break;
            default:
                console.log(`ICE connection state changed to: ${peerConnection.iceConnectionState}`);
        }
    });

        }


    }



    // Event listener for back button
    window.addEventListener('popstate', (event) => {
        if (event.state && event.state.modal) {

        }
    });



    // ✅ Detect if user is on mobile
    function isMobileBrowser() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // ✅ Track current output device
    let currentSinkId = 'default';

    // ✅ Cycle through available speaker options
    async function toggleSpeaker2() {
        const audioElement = document.getElementById('remoteVideo');
        if (typeof audioElement.setSinkId !== 'function') {
            alert("This browser does not support switching audio outputs.");
            return;
        }

        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioOutputs = devices.filter(d => d.kind === 'audiooutput');

            if (audioOutputs.length === 0) {
                alert("No audio output devices found.");
                return;
            }

            let currentIndex = audioOutputs.findIndex(d => d.deviceId === currentSinkId);
            let nextIndex = (currentIndex + 1) % audioOutputs.length;
            const nextDevice = audioOutputs[nextIndex];

            await audioElement.setSinkId(nextDevice.deviceId);
            currentSinkId = nextDevice.deviceId;

            console.log(`Switched to: ${nextDevice.label || 'Unnamed device'}`);
        } catch (err) {
            console.error("Error switching output device", err);
            alert("Could not switch speaker. See console for details.");
        }
    }

    // ✅ Replace screen share button with speaker control if on mobile
    document.addEventListener('DOMContentLoaded', () => {
        if (isMobileBrowser()) {
            const screenShareBtn = document.getElementById('screenShareButton');
            if (screenShareBtn) {
                const speakerBtn = document.createElement('button');
                speakerBtn.id = 'speakerToggleButton';
                speakerBtn.title = "Switch Speaker";
                speakerBtn.innerHTML = `<img src="speaker-solid.png" alt="Speaker" />`;
                speakerBtn.onclick = toggleSpeaker2;
                speakerBtn.style.borderRadius = '50%';
                speakerBtn.style.border = '2px solid black';
                speakerBtn.style.backgroundColor = 'rgba(255,255,255,0.8)';
                speakerBtn.style.width = '50px';
                speakerBtn.style.height = '50px';
                speakerBtn.style.display = 'flex';
                speakerBtn.style.alignItems = 'center';
                speakerBtn.style.justifyContent = 'center';

                screenShareBtn.replaceWith(speakerBtn);
            }
        }
    });


    // Add this function to check connection status periodically
    function startConnectionMonitoring() {
        setInterval(() => {
            const statusIndicator = document.getElementById('status-indicator');
            const isPeerOffline = statusIndicator && statusIndicator.classList.contains('offline');
            const isBrowserOnline = navigator.onLine;

            if (isPeerOffline && isBrowserOnline) {
                console.log('Peer disconnected but browser is online. Reloading page to attempt reconnection...');
                location.reload();
            } else if (isPeerOffline && !isBrowserOnline) {
                console.log('Peer disconnected and browser is offline. Not reloading.');
            }
        }, 15000);
    }


    // Start monitoring when the page loads
    document.addEventListener('DOMContentLoaded', () => {
        startConnectionMonitoring();
    });
